services:
  flask-gunicorn-app:
    image: servingmlmodels-flask-gunicorn-app:1.0.0
    build:
      context: .
      dockerfile: ./dockerfiles/Dockerfile.flask-gunicorn-app
    expose:
      - "8000"
    restart: always

  nginx:
    image: servingmlmodels-nginx:1.0.0
    build:
      context: .
      dockerfile: ./dockerfiles/Dockerfile.nginx
    depends_on:
      - flask-gunicorn-app
    ports:
      - "80:80"
      - "443:443"
    restart: always
